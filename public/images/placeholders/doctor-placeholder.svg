<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf2f6"/>
      <stop offset="100%" stop-color="#d5e3eb"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf2f6"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d5c2"/>
      <stop offset="100%" stop-color="#e4c0a8"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5a6a"/>
      <stop offset="100%" stop-color="#3a4a5a"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="200" cy="180" r="110"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="400" height="500" rx="20" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="480" rx="16" fill="#ffffff" opacity="0.6"/>

  <!-- Head and shoulders circle frame -->
  <circle cx="200" cy="180" r="110" fill="#ffffff" stroke="#0b5e77" stroke-width="3" opacity="0.3"/>

  <!-- Shoulders / White coat -->
  <path d="M100 420 Q120 280 200 260 Q280 280 300 420" fill="url(#coat)" stroke="#d0dce8" stroke-width="1"/>
  <path d="M120 420 L100 500 L150 500 L160 420" fill="url(#coat)"/>
  <path d="M280 420 L300 500 L250 500 L240 420" fill="url(#coat)"/>

  <!-- Coat collar -->
  <path d="M175 260 L185 280 L200 270 L215 280 L225 260" fill="#ffffff" stroke="#d0dce8" stroke-width="1"/>

  <!-- Tie -->
  <path d="M195 275 L200 285 L205 275 L202 330 L198 330 Z" fill="#0b5e77"/>

  <!-- Neck -->
  <rect x="180" y="250" width="40" height="25" rx="6" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="200" cy="195" rx="68" ry="80" fill="url(#skin)" clip-path="url(#circle)"/>

  <!-- Hair -->
  <ellipse cx="200" cy="130" rx="72" ry="65" fill="url(#hair)"/>
  <ellipse cx="200" cy="160" rx="68" ry="45" fill="url(#hair)"/>
  <ellipse cx="160" cy="140" rx="25" ry="55" fill="url(#hair)"/>
  <ellipse cx="240" cy="140" rx="25" ry="55" fill="url(#hair)"/>

  <!-- Ears -->
  <ellipse cx="132" cy="190" rx="8" ry="14" fill="url(#skin)"/>
  <ellipse cx="268" cy="190" rx="8" ry="14" fill="url(#skin)"/>

  <!-- Eyebrows -->
  <path d="M170 172 Q182 166 195 170" stroke="#3a4a5a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M205 170 Q218 166 230 172" stroke="#3a4a5a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="183" cy="185" rx="9" ry="5" fill="#ffffff"/>
  <circle cx="183" cy="185" r="4.5" fill="#3a5a6a"/>
  <circle cx="182" cy="184" r="1.5" fill="#ffffff"/>

  <ellipse cx="217" cy="185" rx="9" ry="5" fill="#ffffff"/>
  <circle cx="217" cy="185" r="4.5" fill="#3a5a6a"/>
  <circle cx="216" cy="184" r="1.5" fill="#ffffff"/>

  <!-- Nose -->
  <path d="M197 190 Q194 205 200 208 Q206 205 203 190" stroke="#c4a890" stroke-width="1.5" fill="none"/>

  <!-- Smile -->
  <path d="M182 215 Q200 228 218 215" stroke="#b08068" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Smile lines -->
  <path d="M175 218 Q178 222 182 220" stroke="#c4a890" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M225 218 Q222 222 218 220" stroke="#c4a890" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Name label -->
  <text x="200" y="380" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#0b5e77" text-anchor="middle">Dr. Lawrence Mikkelson</text>
  <text x="200" y="405" font-family="system-ui, sans-serif" font-size="13" fill="#6a8a9a" text-anchor="middle" letter-spacing="1">CHIROPRACTOR · FLORENCE, KY</text>

  <!-- Placeholder badge -->
  <rect x="120" y="435" width="160" height="30" rx="15" fill="#0b5e77" opacity="0.8"/>
  <text x="200" y="455" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">PLACEHOLDER — REPLACEABLE IMAGE</text>
</svg>
