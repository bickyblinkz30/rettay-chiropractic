<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#f0f6fa"/>
      <stop offset="100%" stop-color="#dce6ee"/>
    </radialGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d0ba"/>
      <stop offset="100%" stop-color="#dcb498"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4a2a"/>
      <stop offset="100%" stop-color="#4a2a1a"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>
  <!-- Hair -->
  <ellipse cx="60" cy="44" rx="42" ry="38" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="60" cy="56" rx="38" ry="22" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="42" cy="50" rx="20" ry="36" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <!-- Skin -->
  <ellipse cx="60" cy="62" rx="34" ry="36" fill="url(#skinGrad)" clip-path="url(#circle)"/>
  <!-- Eyes -->
  <ellipse cx="50" cy="58" rx="5" ry="3" fill="#ffffff" clip-path="url(#circle)"/>
  <circle cx="50" cy="58" r="3" fill="#3a5a6a" clip-path="url(#circle)"/>
  <circle cx="49" cy="57" r="1" fill="#ffffff" clip-path="url(#circle)"/>
  <ellipse cx="70" cy="58" rx="5" ry="3" fill="#ffffff" clip-path="url(#circle)"/>
  <circle cx="70" cy="58" r="3" fill="#3a5a6a" clip-path="url(#circle)"/>
  <circle cx="69" cy="57" r="1" fill="#ffffff" clip-path="url(#circle)"/>
  <!-- Eyebrows -->
  <path d="M44 50 Q50 48 56 50" stroke="#4a2a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M64 50 Q70 48 76 50" stroke="#4a2a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M59 62 Q58 67 60 69 Q62 67 61 62" stroke="#c4a890" stroke-width="1" fill="none"/>
  <!-- Warm smile -->
  <path d="M53 74 Q60 80 67 74" stroke="#a07058" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M55 73 Q60 77 65 73" stroke="#d0a890" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Shoulders -->
  <path d="M20 120 Q36 88 60 84 Q84 88 100 120" fill="#d0d8e0" clip-path="url(#circle)"/>
</svg>
