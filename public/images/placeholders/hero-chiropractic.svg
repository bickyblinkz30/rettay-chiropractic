<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" fill="none">
  <defs>
    <radialGradient id="lightGlow" cx="0.7" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4e8f0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wallBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f8fa"/>
      <stop offset="100%" stop-color="#e8eef2"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d5dce0"/>
      <stop offset="100%" stop-color="#c0c8cc"/>
    </linearGradient>
    <linearGradient id="coatGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f5"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2d4be"/>
      <stop offset="40%" stop-color="#ecc8b0"/>
      <stop offset="100%" stop-color="#e0b898"/>
    </linearGradient>
    <linearGradient id="skinGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ceb8"/>
      <stop offset="40%" stop-color="#e8c0a8"/>
      <stop offset="100%" stop-color="#dcb498"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5a6a"/>
      <stop offset="60%" stop-color="#3a4a58"/>
      <stop offset="100%" stop-color="#2a3845"/>
    </linearGradient>
    <linearGradient id="patientHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4a3a"/>
      <stop offset="60%" stop-color="#5a3a2a"/>
      <stop offset="100%" stop-color="#4a2a1a"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6a80"/>
      <stop offset="100%" stop-color="#0f5268"/>
    </linearGradient>
    <linearGradient id="tablePad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e8ee"/>
      <stop offset="100%" stop-color="#c8d4dc"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f0f8"/>
      <stop offset="100%" stop-color="#c8e0ee"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="2" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Wall background -->
  <rect width="1440" height="900" fill="url(#wallBg)"/>
  <rect width="1440" height="900" fill="url(#lightGlow)"/>

  <!-- Baseboard -->
  <rect x="0" y="680" width="1440" height="12" fill="#c8d0d6"/>

  <!-- Floor -->
  <rect x="0" y="692" width="1440" height="208" fill="url(#floor)"/>
  <line x1="0" y1="740" x2="1440" y2="740" stroke="#bcc4c8" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="790" x2="1440" y2="790" stroke="#bcc4c8" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="840" x2="1440" y2="840" stroke="#bcc4c8" stroke-width="0.5" opacity="0.4"/>

  <!-- Window -->
  <rect x="950" y="80" width="380" height="520" rx="6" fill="url(#windowGrad)" stroke="#b8d0dc" stroke-width="2"/>
  <rect x="960" y="90" width="170" height="500" rx="3" fill="#eaf6fc" opacity="0.5"/>
  <rect x="1150" y="90" width="170" height="500" rx="3" fill="#eaf6fc" opacity="0.5"/>
  <line x1="1130" y1="80" x2="1130" y2="600" stroke="#b8d0dc" stroke-width="2"/>
  <line x1="950" y1="340" x2="1330" y2="340" stroke="#b8d0dc" stroke-width="2"/>
  <!-- Window light rays -->
  <polygon points="960,90 1200,80 1300,340 1100,340" fill="#ffffff" opacity="0.06"/>
  <polygon points="1150,90 1330,80 1440,340 1300,340" fill="#ffffff" opacity="0.04"/>

  <!-- Treatment table -->
  <rect x="250" y="430" width="600" height="50" rx="10" fill="url(#tableGrad)" filter="url(#softShadow)"/>
  <rect x="260" y="435" width="580" height="40" rx="8" fill="url(#tablePad)"/>
  <rect x="270" y="445" width="300" height="12" rx="6" fill="#b8c8d4" opacity="0.4"/>
  <rect x="270" y="462" width="350" height="8" rx="4" fill="#b8c8d4" opacity="0.3"/>
  <!-- Table legs -->
  <rect x="280" y="480" width="16" height="140" rx="6" fill="#8a9aaa"/>
  <rect x="804" y="480" width="16" height="140" rx="6" fill="#8a9aaa"/>
  <rect x="272" y="610" width="32" height="12" rx="6" fill="#7a8a9a"/>
  <rect x="796" y="610" width="32" height="12" rx="6" fill="#7a8a9a"/>

  <!-- Patient lying on table -->
  <ellipse cx="500" cy="430" rx="50" ry="18" fill="#dce4ec" opacity="0.5"/>

  <!-- Patient body -->
  <ellipse cx="550" cy="410" rx="70" ry="30" fill="#708090" opacity="0.3"/>

  <!-- Patient head -->
  <circle cx="320" cy="420" r="32" fill="url(#skinGrad2)"/>
  <ellipse cx="320" cy="395" rx="34" ry="26" fill="url(#patientHair)"/>
  <ellipse cx="300" cy="405" rx="18" ry="20" fill="url(#patientHair)"/>
  <!-- Patient features (closed eyes - relaxed) -->
  <path d="M306 417 Q312 413 318 417" stroke="#7a5a4a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M324 417 Q330 413 336 417" stroke="#7a5a4a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M318 425 Q321 429 324 425" stroke="#a07868" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Patient pillow -->
  <ellipse cx="340" cy="430" rx="55" ry="12" fill="#dce4ec" opacity="0.6"/>

  <!-- Doctor body -->
  <ellipse cx="640" cy="380" rx="45" ry="120" fill="url(#coatGrad)" filter="url(#softShadow)"/>

  <!-- Doctor head -->
  <circle cx="640" cy="230" r="48" fill="url(#skinGrad)"/>
  <!-- Doctor hair -->
  <ellipse cx="640" cy="195" rx="52" ry="40" fill="url(#hairGrad)"/>
  <ellipse cx="640" cy="215" rx="48" ry="28" fill="url(#hairGrad)"/>
  <ellipse cx="618" cy="200" rx="16" ry="34" fill="url(#hairGrad)"/>

  <!-- Doctor face features -->
  <!-- Eyebrows -->
  <path d="M618 220 Q630 214 642 218" stroke="#3a4a58" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M648 218 Q660 214 672 220" stroke="#3a4a58" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="630" cy="233" rx="10" ry="5.5" fill="#ffffff"/>
  <circle cx="630" cy="233" r="5" fill="#3a5a6a"/>
  <circle cx="629" cy="232" r="1.8" fill="#ffffff"/>

  <ellipse cx="660" cy="233" rx="10" ry="5.5" fill="#ffffff"/>
  <circle cx="660" cy="233" r="5" fill="#3a5a6a"/>
  <circle cx="659" cy="232" r="1.8" fill="#ffffff"/>

  <!-- Nose -->
  <path d="M643 238 Q640 248 645 252 Q650 248 647 238" stroke="#c4a890" stroke-width="1.5" fill="none"/>
  <ellipse cx="645" cy="252" rx="6" ry="3" fill="#dbb8a0" opacity="0.6"/>

  <!-- Warm smile -->
  <path d="M628 262 Q645 276 662 262" stroke="#a07058" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M632 260 Q645 270 658 260" stroke="#d0a890" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Ears -->
  <ellipse cx="592" cy="240" rx="8" ry="16" fill="url(#skinGrad)"/>
  <ellipse cx="688" cy="240" rx="8" ry="16" fill="url(#skinGrad)"/>

  <!-- Neck -->
  <rect x="622" y="270" width="36" height="30" rx="8" fill="url(#skinGrad)"/>

  <!-- White coat collar -->
  <path d="M600 298 L615 315 L640 305 L665 315 L680 298" fill="#ffffff" stroke="#d8e0e8" stroke-width="1.5"/>

  <!-- Tie -->
  <path d="M632 310 L640 325 L648 310 L645 380 L635 380 Z" fill="#0b5e77"/>

  <!-- Doctor arms reaching toward patient -->
  <path d="M595 340 Q530 370 490 395" stroke="url(#coatGrad)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M685 340 Q720 360 740 380" stroke="url(#coatGrad)" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Doctor hands -->
  <ellipse cx="488" cy="398" rx="14" ry="10" fill="url(#skinGrad)"/>
  <ellipse cx="742" cy="383" rx="14" ry="10" fill="url(#skinGrad)"/>
  <!-- Fingers -->
  <ellipse cx="480" cy="400" rx="5" ry="4" fill="#ecc8b0"/>
  <ellipse cx="495" cy="402" rx="5" ry="4" fill="#ecc8b0"/>
  <ellipse cx="738" cy="385" rx="5" ry="4" fill="#ecc8b0"/>
  <ellipse cx="750" cy="380" rx="5" ry="4" fill="#ecc8b0"/>

  <!-- Stethoscope -->
  <path d="M620 300 Q590 345 600 370" stroke="#7090a0" stroke-width="2.5" fill="none"/>
  <path d="M660 300 Q690 345 680 370" stroke="#7090a0" stroke-width="2.5" fill="none"/>
  <circle cx="600" cy="372" r="7" fill="#7090a0"/>
  <circle cx="680" cy="372" r="7" fill="#7090a0"/>
  <path d="M610 372 Q640 390 670 372" stroke="#7090a0" stroke-width="2" fill="none"/>

  <!-- Bookshelf on wall -->
  <rect x="80" y="180" width="140" height="180" rx="4" fill="#d0d8de" stroke="#c0c8d0" stroke-width="1"/>
  <rect x="85" y="185" width="130" height="40" rx="2" fill="#c8d4dc"/>
  <rect x="88" y="188" width="20" height="34" rx="2" fill="#0b5e77" opacity="0.7"/>
  <rect x="112" y="190" width="16" height="32" rx="2" fill="#2a7a8a" opacity="0.6"/>
  <rect x="132" y="186" width="22" height="36" rx="2" fill="#4a9aaa" opacity="0.4"/>
  <rect x="85" y="230" width="130" height="40" rx="2" fill="#c8d4dc"/>
  <rect x="90" y="233" width="28" height="34" rx="2" fill="#5a6a7a" opacity="0.5"/>
  <rect x="122" y="235" width="18" height="32" rx="2" fill="#3a5a6a" opacity="0.6"/>
  <rect x="85" y="275" width="130" height="40" rx="2" fill="#c8d4dc"/>
  <rect x="90" y="278" width="24" height="34" rx="2" fill="#1a6a80" opacity="0.7"/>
  <rect x="118" y="280" width="30" height="32" rx="2" fill="#8a9aaa" opacity="0.4"/>
  <rect x="85" y="320" width="130" height="35" rx="2" fill="#c8d4dc"/>

  <!-- Skeleton model in corner -->
  <circle cx="145" cy="145" rx="10" fill="#e8dcc8" stroke="#d0c8b8" stroke-width="1"/>
  <rect x="140" y="155" width="10" height="25" rx="4" fill="#e8dcc8" stroke="#d0c8b8" stroke-width="0.5"/>

  <!-- Small potted plant -->
  <rect x="875" y="580" width="36" height="50" rx="4" fill="#c8a080"/>
  <ellipse cx="893" cy="570" rx="28" ry="25" fill="#5a8a5a" opacity="0.7"/>
  <ellipse cx="885" cy="565" rx="18" ry="18" fill="#6a9a6a" opacity="0.6"/>
  <ellipse cx="900" cy="568" rx="15" ry="15" fill="#4a7a4a" opacity="0.5"/>

  <!-- Light overlay from window -->
  <rect x="800" y="0" width="640" height="900" fill="#ffffff" opacity="0.03"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
  </radialGradient>
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>
