<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f7fa"/>
      <stop offset="100%" stop-color="#e8f0f5"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d6c4"/>
      <stop offset="100%" stop-color="#e8c4b0"/>
    </linearGradient>
    <linearGradient id="skin2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ccb8"/>
      <stop offset="100%" stop-color="#e0b8a0"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b5e77"/>
      <stop offset="100%" stop-color="#094d63"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Window light -->
  <rect x="750" y="60" width="380" height="500" rx="8" fill="#ffffff" opacity="0.3" stroke="#d0e0e8" stroke-width="1"/>
  <rect x="770" y="80" width="160" height="460" rx="4" fill="#ffffff" opacity="0.15"/>
  <rect x="950" y="80" width="160" height="460" rx="4" fill="#ffffff" opacity="0.15"/>

  <!-- Treatment table -->
  <rect x="280" y="400" width="500" height="30" rx="15" fill="#d0e0e8"/>
  <rect x="290" y="420" width="480" height="100" rx="10" fill="#e8f0f5"/>
  <rect x="300" y="430" width="200" height="10" rx="5" fill="#c8d8e0" opacity="0.5"/>
  <rect x="300" y="450" width="250" height="10" rx="5" fill="#c8d8e0" opacity="0.5"/>
  <rect x="300" y="470" width="180" height="10" rx="5" fill="#c8d8e0" opacity="0.5"/>

  <!-- Table legs -->
  <rect x="310" y="520" width="8" height="80" rx="4" fill="#b0c4d0"/>
  <rect x="740" y="520" width="8" height="80" rx="4" fill="#b0c4d0"/>

  <!-- Doctor body -->
  <ellipse cx="520" cy="360" rx="35" ry="100" fill="url(#coat)"/>

  <!-- Doctor head -->
  <circle cx="520" cy="230" r="45" fill="url(#skin)"/>
  <!-- Hair -->
  <ellipse cx="520" cy="195" rx="48" ry="38" fill="#3a4a5a"/>
  <ellipse cx="520" cy="210" rx="42" ry="25" fill="#3a4a5a"/>

  <!-- Face features -->
  <circle cx="505" cy="228" r="3.5" fill="#4a6a7a"/>
  <circle cx="535" cy="228" r="3.5" fill="#4a6a7a"/>
  <ellipse cx="520" cy="240" rx="12" ry="5" fill="#c48a70" opacity="0.6"/>

  <!-- Doctor smile -->
  <path d="M510 248 Q520 255 530 248" stroke="#b07058" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- White coat collar -->
  <path d="M490 280 L510 295 L520 285 L530 295 L550 280" fill="#ffffff" stroke="#e0e8f0" stroke-width="1"/>

  <!-- Stethoscope -->
  <path d="M505 285 Q480 320 490 340" stroke="#6a8a9a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="490" cy="345" r="6" fill="#6a8a9a"/>
  <path d="M535 285 Q560 320 550 340" stroke="#6a8a9a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="550" cy="345" r="6" fill="#6a8a9a"/>

  <!-- Doctor arms -->
  <path d="M485 320 Q440 350 430 380" stroke="url(#coat)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M555 320 Q580 350 590 370" stroke="url(#coat)" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Doctor hands on patient -->
  <ellipse cx="430" cy="385" rx="12" ry="8" fill="url(#skin)"/>
  <ellipse cx="590" cy="375" rx="12" ry="8" fill="url(#skin)"/>

  <!-- Patient body (lying on table) -->
  <ellipse cx="530" cy="400" rx="40" ry="20" fill="#d8e4ec" opacity="0.6"/>

  <!-- Patient head -->
  <circle cx="310" cy="395" r="30" fill="url(#skin2)"/>
  <!-- Patient hair -->
  <ellipse cx="310" cy="375" rx="32" ry="22" fill="#5a4a3a"/>

  <!-- Patient features (eyes closed) -->
  <path d="M300 392 Q304 388 308 392" stroke="#4a3a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M315 392 Q319 388 323 392" stroke="#4a3a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Brand overlay -->
  <rect x="0" y="700" width="1200" height="100" fill="url(#teal)" opacity="0.9"/>
  <text x="80" y="760" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="1">RETTAY CHIROPRACTIC</text>
  <text x="80" y="785" font-family="system-ui, sans-serif" font-size="13" fill="#8ac4d8" letter-spacing="2">PROFESSIONAL CHIROPRACTIC CARE — FLORENCE, KY</text>
  <rect x="1050" y="725" width="80" height="50" rx="8" fill="#ffffff" opacity="0.15"/>
  <text x="1068" y="755" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.6">PLACEHOLDER</text>
  <text x="1063" y="768" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.6">IMAGE</text>
</svg>
