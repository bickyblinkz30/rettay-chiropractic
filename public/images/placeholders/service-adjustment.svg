<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7fa"/>
      <stop offset="100%" stop-color="#e4eef5"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d5c2"/>
      <stop offset="100%" stop-color="#e4c0a8"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef3f7"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Doctor on left -->
  <ellipse cx="230" cy="180" rx="30" ry="60" fill="url(#coat)"/>
  <circle cx="230" cy="110" r="28" fill="url(#skin)"/>
  <ellipse cx="230" cy="82" rx="30" ry="25" fill="#3a4a5a"/>
  <circle cx="225" cy="108" r="2.5" fill="#3a5a6a"/>
  <circle cx="235" cy="108" r="2.5" fill="#3a5a6a"/>
  <!-- Doctor arms reaching to spine -->
  <path d="M200 155 Q170 170 165 190" stroke="url(#coat)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M260 155 Q290 170 295 190" stroke="url(#coat)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="165" cy="192" r="8" fill="url(#skin)"/>
  <circle cx="295" cy="192" r="8" fill="url(#skin)"/>
  <!-- Patient spine outline -->
  <rect x="175" y="195" width="8" height="12" rx="3" fill="#c8d8e5"/>
  <rect x="175" y="212" width="8" height="12" rx="3" fill="#c8d8e5"/>
  <rect x="175" y="229" width="8" height="12" rx="3" fill="#c8d8e5"/>
  <rect x="175" y="246" width="8" height="12" rx="3" fill="#c8d8e5"/>
  <rect x="175" y="263" width="8" height="12" rx="3" fill="#c8d8e5"/>
  <!-- Spine highlight (being adjusted) -->
  <rect x="175" y="212" width="10" height="12" rx="3" fill="#0b5e77" opacity="0.5"/>
  <!-- Adjustment lines -->
  <line x1="180" y1="218" x2="180" y2="195" stroke="#0b5e77" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.4"/>
  <line x1="180" y1="218" x2="180" y2="240" stroke="#0b5e77" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.4"/>
  <!-- Energy/sparkle -->
  <circle cx="160" cy="180" r="2" fill="#f5a623" opacity="0.7"/>
  <circle cx="300" cy="180" r="2" fill="#f5a623" opacity="0.7"/>
  <circle cx="175" cy="170" r="1.5" fill="#f5a623" opacity="0.5"/>
  <!-- Label -->
  <rect x="200" y="340" width="200" height="40" rx="8" fill="#0b5e77" opacity="0.85"/>
  <text x="300" y="365" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">CHIROPRACTIC ADJUSTMENT</text>
  <text x="300" y="395" font-family="system-ui, sans-serif" font-size="10" fill="#6a8a9a" text-anchor="middle" letter-spacing="2">PLACEHOLDER — REPLACEABLE</text>
</svg>
