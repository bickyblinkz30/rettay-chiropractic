<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0f7fa"/><stop offset="100%" stop-color="#e4eef5"/></linearGradient><linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0d5c2"/><stop offset="100%" stop-color="#e4c0a8"/></linearGradient></defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Athlete figure running -->
  <circle cx="300" cy="90" r="25" fill="url(#skin)"/>
  <ellipse cx="300" cy="68" rx="27" ry="22" fill="#2a1a0a"/>
  <ellipse cx="300" cy="170" rx="30" ry="50" fill="#0b5e77" opacity="0.3"/>
  <!-- Legs running -->
  <path d="M285 220 L260 300 L240 340" stroke="#0b5e77" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <path d="M315 220 L340 290 L360 330" stroke="#0b5e77" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Arms -->
  <path d="M275 150 L240 180 L230 220" stroke="#0b5e77" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <path d="M325 150 L360 170 L370 210" stroke="#0b5e77" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Knee wrap/bandage -->
  <rect x="250" y="290" width="20" height="25" rx="5" fill="#ffffff" stroke="#d0dce8" stroke-width="1" opacity="0.8"/>
  <line x1="255" y1="295" x2="265" y2="295" stroke="#c0d8e5" stroke-width="1" opacity="0.6"/>
  <line x1="255" y1="302" x2="265" y2="302" stroke="#c0d8e5" stroke-width="1" opacity="0.6"/>
  <line x1="255" y1="309" x2="265" y2="309" stroke="#c0d8e5" stroke-width="1" opacity="0.6"/>
  <!-- Cross/plus medical -->
  <line x1="420" y1="60" x2="420" y2="120" stroke="#0b5e77" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="390" y1="90" x2="450" y2="90" stroke="#0b5e77" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <text x="300" y="365" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0b5e77" text-anchor="middle" letter-spacing="1">SPORTS INJURY RECOVERY</text>
  <text x="300" y="390" font-family="system-ui, sans-serif" font-size="9" fill="#8a9aac" text-anchor="middle" letter-spacing="2">PLACEHOLDER</text>
</svg>
