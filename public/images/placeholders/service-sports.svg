<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef5f8"/>
      <stop offset="100%" stop-color="#dce6ee"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d0ba"/>
      <stop offset="100%" stop-color="#dcb498"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8644a"/>
      <stop offset="100%" stop-color="#d0503a"/>
    </linearGradient>
    <linearGradient id="shortGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a4a"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <linearGradient id="wrapGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dce4ec"/>
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Athlete body shirt -->
  <ellipse cx="300" cy="180" rx="38" ry="60" fill="url(#shirtGrad)" filter="url(#shadow)"/>

  <!-- Athlete head -->
  <circle cx="300" cy="100" r="30" fill="url(#skinGrad)"/>
  <!-- Hair -->
  <ellipse cx="300" cy="74" rx="32" ry="26" fill="url(#hairGrad)"/>
  <ellipse cx="300" cy="92" rx="28" ry="16" fill="url(#hairGrad)"/>
  <!-- Face -->
  <circle cx="294" cy="98" r="2.5" fill="#3a2a1a"/>
  <circle cx="306" cy="98" r="2.5" fill="#3a2a1a"/>
  <path d="M295 110 Q300 115 305 110" stroke="#a07058" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Arms in motion -->
  <path d="M260 150 Q220 170 210 210" stroke="#d0503a" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M340 150 Q380 170 390 210" stroke="#d0503a" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Hands -->
  <circle cx="210" cy="212" r="7" fill="url(#skinGrad)"/>
  <circle cx="390" cy="212" r="7" fill="url(#skinGrad)"/>

  <!-- Legs running -->
  <path d="M278 235 Q260 280 240 320 Q230 340 220 355" stroke="url(#shortGrad)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M322 235 Q340 275 355 310 Q365 330 370 345" stroke="url(#shortGrad)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lower legs -->
  <path d="M220 355 Q215 370 218 385" stroke="url(#skinGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M370 345 Q372 360 368 380" stroke="url(#skinGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Shoes -->
  <ellipse cx="218" cy="388" rx="12" ry="5" fill="#ffffff" stroke="#d0d8e0" stroke-width="1"/>
  <ellipse cx="368" cy="383" rx="12" ry="5" fill="#ffffff" stroke="#d0d8e0" stroke-width="1"/>
  <rect x="208" y="386" width="20" height="4" rx="2" fill="#e8644a"/>
  <rect x="358" y="381" width="20" height="4" rx="2" fill="#e8644a"/>

  <!-- Knee support wrap -->
  <rect x="208" y="340" width="24" height="28" rx="6" fill="url(#wrapGrad)" stroke="#c8d4dc" stroke-width="1" filter="url(#shadow)"/>
  <line x1="214" y1="348" x2="226" y2="348" stroke="#b0c0cc" stroke-width="1.5" opacity="0.6"/>
  <line x1="214" y1="355" x2="226" y2="355" stroke="#b0c0cc" stroke-width="1.5" opacity="0.6"/>
  <line x1="214" y1="362" x2="226" y2="362" stroke="#b0c0cc" stroke-width="1.5" opacity="0.6"/>

  <!-- Motion lines -->
  <line x1="160" y1="180" x2="130" y2="180" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="165" y1="200" x2="140" y2="200" stroke="#b0c4d0" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="170" y1="220" x2="145" y2="220" stroke="#b0c4d0" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Medical cross symbol -->
  <g transform="translate(460, 80)" opacity="0.25">
    <rect x="-4" y="-18" width="8" height="36" rx="2" fill="#0b5e77"/>
    <rect x="-18" y="-4" width="36" height="8" rx="2" fill="#0b5e77"/>
  </g>

  <!-- Label -->
  <rect x="180" y="355" width="240" height="32" rx="16" fill="#0b5e77" opacity="0.85"/>
  <text x="300" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">SPORTS INJURY RECOVERY</text>
</svg>
