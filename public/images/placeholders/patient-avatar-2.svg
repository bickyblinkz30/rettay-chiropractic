<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#f5efe8"/>
      <stop offset="100%" stop-color="#e8e0d5"/>
    </radialGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ceb8"/>
      <stop offset="100%" stop-color="#dcb498"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>
  <!-- Short hair -->
  <ellipse cx="60" cy="42" rx="44" ry="40" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="60" cy="56" rx="40" ry="18" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <!-- Skin -->
  <ellipse cx="60" cy="62" rx="36" ry="38" fill="url(#skinGrad)" clip-path="url(#circle)"/>
  <!-- Eyes -->
  <ellipse cx="50" cy="58" rx="5" ry="3" fill="#ffffff" clip-path="url(#circle)"/>
  <circle cx="50" cy="58" r="3" fill="#3a5a3a" clip-path="url(#circle)"/>
  <circle cx="49" cy="57" r="1" fill="#ffffff" clip-path="url(#circle)"/>
  <ellipse cx="70" cy="58" rx="5" ry="3" fill="#ffffff" clip-path="url(#circle)"/>
  <circle cx="70" cy="58" r="3" fill="#3a5a3a" clip-path="url(#circle)"/>
  <circle cx="69" cy="57" r="1" fill="#ffffff" clip-path="url(#circle)"/>
  <!-- Eyebrows -->
  <path d="M44 50 Q50 47 56 50" stroke="#2a1a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 50 Q70 47 76 50" stroke="#2a1a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M58 62 Q57 68 60 70 Q63 68 62 62" stroke="#c4a890" stroke-width="1" fill="none"/>
  <!-- Smile -->
  <path d="M52 74 Q60 81 68 74" stroke="#b07860" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Shoulders -->
  <path d="M18 120 Q34 86 60 82 Q86 86 102 120" fill="#d8dce0" clip-path="url(#circle)"/>
</svg>
