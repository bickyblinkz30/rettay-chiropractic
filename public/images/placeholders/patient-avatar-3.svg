<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#f0ece8"/>
      <stop offset="100%" stop-color="#e0d8d0"/>
    </radialGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecc8b0"/>
      <stop offset="100%" stop-color="#d8b098"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a4a"/>
      <stop offset="50%" stop-color="#7a5a3a"/>
      <stop offset="100%" stop-color="#5a3a2a"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>
  <!-- Longer hair -->
  <ellipse cx="60" cy="40" rx="44" ry="42" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="60" cy="55" rx="38" ry="20" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="40" cy="48" rx="22" ry="38" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="80" cy="48" rx="22" ry="38" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <!-- Skin -->
  <ellipse cx="60" cy="62" rx="34" ry="36" fill="url(#skinGrad)" clip-path="url(#circle)"/>
  <!-- Glasses -->
  <circle cx="49" cy="59" r="9" fill="none" stroke="#6a5a4a" stroke-width="1.5"/>
  <circle cx="71" cy="59" r="9" fill="none" stroke="#6a5a4a" stroke-width="1.5"/>
  <line x1="58" y1="59" x2="62" y2="59" stroke="#6a5a4a" stroke-width="1.5"/>
  <line x1="40" y1="56" x2="36" y2="53" stroke="#6a5a4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="56" x2="84" y2="53" stroke="#6a5a4a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyes behind glasses -->
  <circle cx="49" cy="59" r="3" fill="#4a3a2a"/>
  <circle cx="71" cy="59" r="3" fill="#4a3a2a"/>
  <circle cx="48" cy="58" r="1" fill="#ffffff"/>
  <circle cx="70" cy="58" r="1" fill="#ffffff"/>
  <!-- Eyebrows -->
  <path d="M44 52 Q49 49 54 52" stroke="#5a3a2a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M66 52 Q71 49 76 52" stroke="#5a3a2a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M59 62 Q58 68 60 70 Q62 68 61 62" stroke="#c4a890" stroke-width="1" fill="none"/>
  <!-- Warm smile -->
  <path d="M52 73 Q60 79 68 73" stroke="#a87860" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Shoulders -->
  <path d="M18 120 Q34 86 60 82 Q86 86 102 120" fill="#d0d4d8" clip-path="url(#circle)"/>
</svg>
