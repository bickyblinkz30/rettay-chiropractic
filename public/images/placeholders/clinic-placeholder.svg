<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7fa"/>
      <stop offset="100%" stop-color="#e4eef5"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b5e77"/>
      <stop offset="100%" stop-color="#0a5268"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Room perspective -->
  <rect x="50" y="80" width="500" height="250" rx="8" fill="#ffffff" stroke="#d0e0e8" stroke-width="1"/>
  <!-- Window -->
  <rect x="400" y="100" width="120" height="150" rx="6" fill="#d8ecf5" stroke="#c0d8e5" stroke-width="1"/>
  <line x1="460" y1="100" x2="460" y2="250" stroke="#c0d8e5" stroke-width="1"/>
  <line x1="400" y1="175" x2="520" y2="175" stroke="#c0d8e5" stroke-width="1"/>
  <!-- Treatment table -->
  <rect x="100" y="230" width="280" height="60" rx="10" fill="#d5e3eb"/>
  <rect x="110" y="240" width="260" height="12" rx="6" fill="#c0d8e5"/>
  <rect x="110" y="260" width="220" height="12" rx="6" fill="#c0d8e5"/>
  <rect x="120" y="290" width="10" height="50" rx="5" fill="#b0c8d8"/>
  <rect x="350" y="290" width="10" height="50" rx="5" fill="#b0c8d8"/>
  <!-- Equipment cart -->
  <rect x="430" y="220" width="50" height="100" rx="6" fill="#d5e3eb" stroke="#c0d8e5" stroke-width="1"/>
  <rect x="435" y="225" width="40" height="30" rx="4" fill="#e8f4f8"/>
  <rect x="435" y="260" width="40" height="25" rx="4" fill="#e8f4f8"/>
  <!-- Skeleton model -->
  <circle cx="170" cy="130" r="12" fill="#e0d8c8" stroke="#c8c0b0" stroke-width="1"/>
  <rect x="165" y="142" width="10" height="35" rx="4" fill="#e0d8c8" stroke="#c8c0b0" stroke-width="0.5"/>
  <line x1="160" y1="150" x2="145" y2="170" stroke="#c8c0b0" stroke-width="2"/>
  <line x1="180" y1="150" x2="195" y2="170" stroke="#c8c0b0" stroke-width="2"/>
  <line x1="170" y1="177" x2="170" y2="210" stroke="#c8c0b0" stroke-width="2"/>
  <line x1="170" y1="210" x2="155" y2="225" stroke="#c8c0b0" stroke-width="2"/>
  <line x1="170" y1="210" x2="185" y2="225" stroke="#c8c0b0" stroke-width="2"/>
  <!-- Desk -->
  <rect x="70" y="340" width="200" height="8" rx="4" fill="#0b5e77" opacity="0.6"/>
  <rect x="80" y="348" width="8" height="35" rx="3" fill="#0b5e77" opacity="0.4"/>
  <rect x="250" y="348" width="8" height="35" rx="3" fill="#0b5e77" opacity="0.4"/>
  <!-- Plants -->
  <ellipse cx="530" cy="280" rx="20" ry="25" fill="#7aab7a" opacity="0.6"/>
  <rect x="526" y="300" width="8" height="20" rx="3" fill="#8a7a5a"/>
  <!-- Brand -->
  <rect x="0" y="350" width="600" height="50" fill="url(#teal)" opacity="0.9" rx="0 0 12 12"/>
  <text x="300" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#8ac4d8" text-anchor="middle" letter-spacing="2">MODERN CHIROPRACTIC CLINIC — PLACEHOLDER</text>
</svg>
