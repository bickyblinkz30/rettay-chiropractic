<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0f7fa"/><stop offset="100%" stop-color="#e4eef5"/></linearGradient><linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0d5c2"/><stop offset="100%" stop-color="#e4c0a8"/></linearGradient></defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Patient seated -->
  <ellipse cx="280" cy="180" rx="35" ry="55" fill="#d0dce8"/>
  <circle cx="280" cy="110" r="28" fill="url(#skin)"/>
  <ellipse cx="280" cy="85" rx="30" ry="22" fill="#3a2a1a"/>
  <!-- Doctor behind -->
  <ellipse cx="320" cy="180" rx="30" ry="60" fill="#ffffff"/>
  <circle cx="320" cy="100" r="26" fill="url(#skin)"/>
  <ellipse cx="320" cy="78" rx="28" ry="22" fill="#3a4a5a"/>
  <!-- Doctor hands on neck -->
  <path d="M290 140 Q275 155 270 170" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M310 140 Q325 155 330 170" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="270" cy="172" r="7" fill="url(#skin)"/>
  <circle cx="330" cy="172" r="7" fill="url(#skin)"/>
  <!-- Neck focus area -->
  <ellipse cx="280" cy="155" rx="18" ry="10" fill="#0b5e77" opacity="0.15"/>
  <text x="300" y="365" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0b5e77" text-anchor="middle" letter-spacing="1">NECK PAIN RELIEF</text>
  <text x="300" y="390" font-family="system-ui, sans-serif" font-size="9" fill="#8a9aac" text-anchor="middle" letter-spacing="2">PLACEHOLDER</text>
</svg>
