<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#eef0f2"/>
      <stop offset="100%" stop-color="#dce0e5"/>
    </radialGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d6c2"/>
      <stop offset="100%" stop-color="#e0bca0"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4a3a"/>
      <stop offset="50%" stop-color="#4a3a2a"/>
      <stop offset="100%" stop-color="#3a2a1a"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>
  <!-- Short cropped hair -->
  <ellipse cx="60" cy="40" rx="44" ry="42" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="60" cy="54" rx="40" ry="18" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <ellipse cx="38" cy="46" rx="18" ry="38" fill="url(#hairGrad)" clip-path="url(#circle)"/>
  <!-- Skin -->
  <ellipse cx="60" cy="62" rx="36" ry="38" fill="url(#skinGrad)" clip-path="url(#circle)"/>
  <!-- Eyes -->
  <ellipse cx="50" cy="58" rx="5.5" ry="3.5" fill="#ffffff" clip-path="url(#circle)"/>
  <circle cx="50" cy="58" r="3.5" fill="#2a3a4a" clip-path="url(#circle)"/>
  <circle cx="49" cy="57" r="1.2" fill="#ffffff" clip-path="url(#circle)"/>
  <ellipse cx="70" cy="58" rx="5.5" ry="3.5" fill="#ffffff" clip-path="url(#circle)"/>
  <circle cx="70" cy="58" r="3.5" fill="#2a3a4a" clip-path="url(#circle)"/>
  <circle cx="69" cy="57" r="1.2" fill="#ffffff" clip-path="url(#circle)"/>
  <!-- Eyebrows -->
  <path d="M44 51 Q50 48 56 51" stroke="#3a2a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 51 Q70 48 76 51" stroke="#3a2a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M58 63 Q57 68 60 70 Q63 68 62 63" stroke="#c8a890" stroke-width="1.2" fill="none"/>
  <!-- Confident smile -->
  <path d="M50 74 Q60 82 70 74" stroke="#a07058" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M54 72 Q60 77 66 72" stroke="#d0a890" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Shoulders -->
  <path d="M18 120 Q34 86 60 82 Q86 86 102 120" fill="#c8d0d8" clip-path="url(#circle)"/>
</svg>
