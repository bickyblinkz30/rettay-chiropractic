<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0f7fa"/><stop offset="100%" stop-color="#e4eef5"/></linearGradient><linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0d5c2"/><stop offset="100%" stop-color="#e4c0a8"/></linearGradient></defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Patient figure holding lower back -->
  <circle cx="300" cy="120" r="30" fill="url(#skin)"/>
  <ellipse cx="300" cy="95" rx="32" ry="25" fill="#4a3a2a"/>
  <ellipse cx="300" cy="220" rx="35" ry="65" fill="#d0dce8"/>
  <!-- Arms reaching to back -->
  <path d="M265 200 Q240 230 270 260" stroke="#d0dce8" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M335 200 Q360 230 330 260" stroke="#d0dce8" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Pain area highlight -->
  <ellipse cx="300" cy="250" rx="25" ry="15" fill="#e85050" opacity="0.2"/>
  <ellipse cx="300" cy="250" rx="15" ry="8" fill="#e85050" opacity="0.3"/>
  <!-- Pain lines -->
  <line x1="275" y1="245" x2="265" y2="240" stroke="#e85050" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="325" y1="245" x2="335" y2="240" stroke="#e85050" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="300" y1="265" x2="300" y2="278" stroke="#e85050" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <text x="300" y="365" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0b5e77" text-anchor="middle" letter-spacing="1">BACK PAIN TREATMENT</text>
  <text x="300" y="390" font-family="system-ui, sans-serif" font-size="9" fill="#8a9aac" text-anchor="middle" letter-spacing="2">PLACEHOLDER</text>
</svg>
